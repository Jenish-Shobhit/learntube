<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  :root { color-scheme: dark light; }
  body {
    width: 248px;
    margin: 0;
    padding: 16px 18px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
    background: #0f0f0f;
    color: #f1f1f1;
  }
  h1 {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.2px;
    margin: 0 0 2px;
  }
  p {
    font-size: 11.5px;
    line-height: 1.45;
    color: #aaa;
    margin: 0 0 14px;
  }
  .panel {
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    padding: 12px 14px;
  }
  .panel-title {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    color: #888;
    margin: 0 0 10px;
  }
  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .hint {
    font-size: 10.5px;
    line-height: 1.4;
    color: #777;
    margin: 12px 0 0;
  }
  .label { font-size: 13px; font-weight: 500; }
  .switch { position: relative; width: 42px; height: 24px; flex: 0 0 auto; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .track {
    position: absolute; inset: 0;
    background: #3a3a3a; border-radius: 24px;
    transition: background 0.18s ease; cursor: pointer;
  }
  .track::before {
    content: ""; position: absolute;
    height: 18px; width: 18px; left: 3px; top: 3px;
    background: #fff; border-radius: 50%;
    transition: transform 0.18s ease;
  }
  input:checked + .track { background: #30d158; }
  input:checked + .track::before { transform: translateX(18px); }
</style>
</head>
<body>
  <h1>LearnTube</h1>
  <p>A calm place to learn on YouTube. Turn LearnTube off here to see plain YouTube; turn it on to reclaim the page.</p>
  <div class="panel">
    <div class="panel-title">Settings</div>
    <div class="row">
      <span class="label">Master switch</span>
      <label class="switch">
        <input type="checkbox" id="master-toggle" />
        <span class="track"></span>
      </label>
    </div>
    <p class="hint">More controls land here in later steps.</p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
